<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Chat Global</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      margin: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #chat {

    .msg {
      background: #222;
      margin: 5px;

      border-radius: 5px;

    #inputArea {

      padding: 10px;
      background: #000;

</head>

<body>
<style>
    body {
  background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                    url("../imagens/Menu.webp");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  color: white;
  margin: 0;
}
</style>
    <audio controls autoplay loop>
    <source src="01. Enter Hallownest.mp3" type="audio/mpeg">
    </audio>
    <font color="blue"><h1>Chat Global</h1></font>
    <h3><a href="../index.html">Voltar!</a></h3>
<div id="chat"></div>

<div id="inputArea">
  <input id="msg" placeholder="Digite sua mensagem...">
  <button onclick="sendMsg()">Enviar</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
  // 🔥 CONFIGURAÇÃO CORRIGIDA
  const firebaseConfig = {
    apiKey: "AIzaSyD8idKcs3eVYib-u9PsW3R61ZRa4EuPfdU",
    authDomain: "knight-55f33.firebaseapp.com",
    databaseURL: "https://knight-55f33-default-rtdb.firebaseio.com",
    projectId: "knight-55f33",
    storageBucket: "knight-55f33.appspot.com",
    messagingSenderId: "733374738664",
    appId: "1:733374738664:web:245d016182d96145c4995d",
    measurementId: "G-HCPPZTK4RB"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const chat = document.getElementById("chat");

  // 🔥 receber mensagens em tempo real
  db.ref("mensagens").on("child_added", function(snapshot) {
    const data = snapshot.val();

    const div = document.createElement("div");
    div.classList.add("msg");
    div.innerText = data.text;

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  });

  // 🔥 enviar mensagem
  function sendMsg() {
    const input = document.getElementById("msg");

    if (input.value.trim() !== "") {
      db.ref("mensagens").push({
        text: input.value
      });

      input.value = "";
    }
  }
</script>
<button onclick="lerPagina()" style="position:fixed;bottom:20px;right:20px;z-index:999;">
  🔊 Ouvir
</button>

<button onclick="pausar()" style="position:fixed;bottom:60px;right:20px;z-index:999;">
  ⏸ Pausar
</button>

<button onclick="continuar()" style="position:fixed;bottom:100px;right:20px;z-index:999;">
  ▶️ Continuar
</button>

<script>
let utterance;

function lerPagina() {
  speechSynthesis.cancel(); // reseta

  const texto = document.body.innerText;

  utterance = new SpeechSynthesisUtterance(texto);
  utterance.lang = "pt-BR";
  utterance.rate = 1;
  utterance.pitch = 1;

  speechSynthesis.speak(utterance);
}

function pausar() {
  speechSynthesis.pause();
}

function continuar() {
  speechSynthesis.resume();
}
</script>
</body>
</html>
