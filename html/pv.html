<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Chat Privado</title>
    <link rel="icon" type="image/x-icon" href="../img/hollow-knight-removebg-preview.png">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: white;
  display: flex;
  height: 100vh;
}

#left {
  width: 30%;
  background: #000;
  padding: 10px;
  overflow-y: auto;
}

#right {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.user {
  padding: 10px;
  background: #222;
  margin: 5px 0;
  cursor: pointer;
}

.user:hover {
  background: #333;
}

#chat {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}

#inputArea {
  display: flex;
}

#msg {
  flex: 1;
  padding: 10px;
}

button {
  padding: 10px;
}

.msg {
  background: #222;
  margin: 5px;
  padding: 8px;
  border-radius: 5px;
}
</style>
</head>

<body>
<style>
    body {
  background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                    url("../imagens/Menu.webp");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  color: white;
  margin: 0;
}
</style>
<!-- LOGIN -->
<div id="loginScreen">
  <h2>Login</h2>
  <input id="email" placeholder="email"><br><br>
  <input id="pass" type="password" placeholder="senha"><br><br>
  <button onclick="login()">Entrar</button>
  <button onclick="register()">Criar conta</button>
</div>

<!-- APP -->
<div id="app" style="display:none; width:100%; height:100%;">

  <div id="left">
    <h3>Usuários</h3>
    <div id="users"></div>
  </div>

  <div id="right">
    <div id="chat"></div>

    <div id="inputArea">
      <input id="msg" placeholder="mensagem...">
      <button onclick="sendMsg()">Enviar</button>
    </div>
  </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

// 🔥 CONFIG FIREBASE (substitua se precisar)
const firebaseConfig = {
    apiKey: "AIzaSyD8idKcs3eVYib-u9PsW3R61ZRa4EuPfdU",
    authDomain: "knight-55f33.firebaseapp.com",
    databaseURL: "https://knight-55f33-default-rtdb.firebaseio.com",
    projectId: "knight-55f33",
    storageBucket: "knight-55f33.appspot.com",
    messagingSenderId: "733374738664",
    appId: "1:733374738664:web:245d016182d96145c4995d",
    measurementId: "G-HCPPZTK4RB"
  };

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

let currentUser = null;
let currentChat = null;

// 🔐 LOGIN
function login(){
  auth.signInWithEmailAndPassword(
    email.value,
    pass.value
  );
}

// 🔐 REGISTRO
function register(){
  auth.createUserWithEmailAndPassword(
    email.value,
    pass.value
  );
}

// 🔥 quando loga
auth.onAuthStateChanged(user => {
  if(user){
    currentUser = user;

    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("app").style.display = "flex";

    loadUsers();
  }
});

// 👥 carregar usuários
function loadUsers(){
  db.ref("users").on("value", snap => {
    users.innerHTML = "";

    snap.forEach(u => {
      if(u.key !== currentUser.uid){
        let div = document.createElement("div");
        div.classList.add("user");
        div.innerText = u.val().email;

        div.onclick = () => openChat(u.key);

        users.appendChild(div);
      }
    });
  });

  // salvar usuário atual
  db.ref("users/" + currentUser.uid).set({
    email: currentUser.email
  });
}

// 💬 abrir chat
function openChat(uid){
  currentChat = [currentUser.uid, uid].sort().join("_");

  chat.innerHTML = "";

  db.ref("chats/" + currentChat).on("child_added", snap => {
    let d = document.createElement("div");
    d.classList.add("msg");
    d.innerText = snap.val().text;

    chat.appendChild(d);
  });
}

// 📩 enviar msg
function sendMsg(){
  let input = document.getElementById("msg");

  if(input.value.trim() !== ""){
    db.ref("chats/" + currentChat).push({
      text: input.value,
      from: currentUser.uid
    });

    input.value = "";
  }
}

</script>
</body>
</html>
